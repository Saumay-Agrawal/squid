services:
  anvil:
    image: ghcr.io/foundry-rs/foundry:stable
    entrypoint: ["anvil"]
    command: ["--host", "0.0.0.0"]
    ports:
      - "8545:8545"
    healthcheck:
      test:
        [
          "CMD",
          "cast",
          "rpc",
          "--rpc-url",
          "http://127.0.0.1:8545",
          "eth_chainId",
        ]
      interval: 5s
      timeout: 5s
      retries: 12

  ui:
    build:
      context: ./ui
      target: dev
    command: npm run dev -- --hostname 0.0.0.0
    environment:
      NEXT_PUBLIC_ANVIL_RPC_URL: http://127.0.0.1:8545
      NEXT_TELEMETRY_DISABLED: "1"
      WATCHPACK_POLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - ./ui:/app
      - ui_node_modules:/app/node_modules
      - ui_next:/app/.next
    depends_on:
      anvil:
        condition: service_healthy

  contracts:
    profiles: ["tools"]
    build:
      context: ./contracts
    env_file:
      - .env
    volumes:
      - ./contracts:/workspace/contracts
      - foundry_cache:/root/.foundry
    working_dir: /workspace/contracts
    entrypoint: ["forge"]
    command: ["test"]

volumes:
  ui_node_modules:
  ui_next:
  foundry_cache:
