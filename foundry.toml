[profile.default]
src = "src"
out = "out"
libs = ["lib"]
remappings = [
    "@uniswap/v4-core/=lib/v4-hooks-public/lib/v4-core/",
    "@uniswap/v4-periphery/=lib/v4-hooks-public/lib/v4-periphery/",
    "@openzeppelin/contracts/=lib/v4-hooks-public/lib/v4-core/lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/",
    "solmate/=lib/v4-hooks-public/lib/v4-core/lib/solmate/"
]
fs_permissions = [
    { access = "read-write", path = "./script/output" }
]

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
